version: 0.1.0

ledger_domains:
  resource_balance:
    description: running balance for fungible resources by owner
  resource_batch:
    description: provenance-tracked batches for salvage, refine, and rare items
  action_cost:
    description: costs paid when an action starts or completes
  action_reward:
    description: rewards granted when an action succeeds
  trade_settlement:
    description: trade-side balance transfers after settlement
  facility_yield:
    description: facility production and maintenance yield or drain
  treasury_flow:
    description: platform, organization, vault, and service fee movement
  frozen_commitment:
    description: resources reserved while waiting for approval
  chain_settlement_mapping:
    description: linkage between chainless ledger entries and chain settlement_epoch records

entities:
  user:
    primary_key: user_id
    description: human account owner
  runtime:
    primary_key: runtime_id
    description: active runtime session identity
  claw:
    primary_key: claw_id
    description: long-lived claw identity
  organization:
    primary_key: organization_id
    description: emergent group treasury and control entity
  facility:
    primary_key: facility_id
    description: buildable, claimable world facility
  sector:
    primary_key: sector_id
    description: location-scoped world entity
  vault:
    primary_key: vault_id
    description: custodial asset entry and withdrawal ledger scope
  settlement_epoch:
    primary_key: settlement_epoch_id
    description: chain-side settlement grouping boundary

entry_types:
  debit:
    sign: negative
    finalizable: true
  credit:
    sign: positive
    finalizable: true
  reserve:
    sign: negative_available_positive_frozen
    finalizable: false
  release:
    sign: positive_available_negative_frozen
    finalizable: true
  finalize:
    sign: no_balance_change_expected_when_following_reserve
    finalizable: true
  rollback:
    sign: inverse_of_reserved_flow
    finalizable: true
  batch_open:
    sign: informational
    finalizable: true
  batch_consume:
    sign: negative_batch_quantity
    finalizable: true
  anchor:
    sign: informational
    finalizable: true

common_fields:
  entry_id:
    type: string
    required: true
  domain:
    type: enum
    required: true
    values:
      - resource_balance
      - resource_batch
      - action_cost
      - action_reward
      - trade_settlement
      - facility_yield
      - treasury_flow
      - frozen_commitment
      - chain_settlement_mapping
  entry_type:
    type: enum
    required: true
    values: [debit, credit, reserve, release, finalize, rollback, batch_open, batch_consume, anchor]
  owner_type:
    type: enum
    required: true
    values: [user, runtime, claw, organization, facility, sector, vault, settlement_epoch]
  owner_id:
    type: string
    required: true
  counterparty_type:
    type: enum
    required: false
    values: [user, runtime, claw, organization, facility, sector, vault, settlement_epoch, none]
  counterparty_id:
    type: string
    required: false
  resource_type:
    type: string
    required: true
  quantity:
    type: integer
    required: true
  unit:
    type: string
    required: true
    default: units
  source_type:
    type: enum
    required: true
    values: [action, event, decision, service, trade, facility_cycle, snapshot, chain_anchor, admin]
  source_id:
    type: string
    required: true
  caused_by_action:
    type: string
    required: false
  caused_by_event:
    type: string
    required: false
  decision_id:
    type: string
    required: false
  session_id:
    type: string
    required: false
  world_tick:
    type: integer
    required: true
  status:
    type: enum
    required: true
    values: [pending, frozen, approved, rejected, finalized, rolled_back, anchored]
  created_at:
    type: timestamp
    required: true
  finalized_at:
    type: timestamp
    required: false
  metadata:
    type: object
    required: true

lifecycle_rules:
  frozen_resource_recording:
    - create reserve entries in frozen_commitment when a high-risk action starts
    - reserve entries must reduce available quantity and increase frozen quantity in metadata
    - reserve entries must reference decision_id and snapshot.snapshot_id
  approval_promotion:
    - when approval is granted, write finalize entries that point back to the reserve entry_id
    - settlement-bearing approvals must also create action_cost, action_reward, trade_settlement, or treasury_flow entries
    - finalized entries must set finalized_at
  approval_rejection_rollback:
    - when approval is rejected, write rollback entries that restore the reserved quantity to available balance
    - rollback entries must reference the original reserve entry_id in metadata.reserve_entry_id
    - rejected decisions must leave no remaining frozen balance for the same source_id
  batch_tracking:
    - salvage and rare resource acquisition must open a resource_batch entry with metadata.batch_id
    - refine, trade, install_core, and build actions must consume batches by metadata.input_batch_ids
    - output batches must keep metadata.origin_batch_ids for provenance tracing
  chain_mapping:
    - every chain-relevant transfer must write a chain_settlement_mapping entry with metadata.settlement_epoch_id
    - mapping entries bind one or more ledger entry_id values to one settlement_epoch_id
    - mapping entries remain pending until onchain proof or tx hash is confirmed
  anchor_candidates:
    - frozen_commitment finalize entries
    - trade_settlement entries above high_value_threshold
    - treasury_flow entries tied to vault withdraw or prize distribution
    - settlement_epoch summary hashes

retention_rules:
  resource_balance:
    retain: permanent
  resource_batch:
    retain: permanent
  action_cost:
    retain: permanent
  action_reward:
    retain: permanent
  trade_settlement:
    retain: permanent
  facility_yield:
    retain: 365d_plus_archive
  treasury_flow:
    retain: permanent
  frozen_commitment:
    retain: permanent
  chain_settlement_mapping:
    retain: permanent

