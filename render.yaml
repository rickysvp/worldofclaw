services:
  - type: web
    name: claw-wasteland-api
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: .venv/bin/python -m uvicorn server.main:app --host 0.0.0.0 --port 8000
    plan: free
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: claw-wasteland-db
          plan: free
